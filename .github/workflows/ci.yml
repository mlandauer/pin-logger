name: Cargo Build & Test

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Pin Logger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update nightly && rustup default nightly && rustup component add clippy
      - run: cargo build --verbose
      - run: cargo test --verbose
      - run: cargo clippy --verbose

  fake_hardware:
    name: fake-hardware example
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/fake-hardware
    steps:
      - uses: actions/checkout@v4
      - run: rustup update nightly
      - run: cargo build --verbose

  esp_examples:
    name: ESP32 examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust for Xtensa
        run: |
          curl -L https://github.com/esp-rs/espup/releases/latest/download/espup-x86_64-unknown-linux-gnu -o espup
          chmod a+x espup
          ./espup install
      - run: . ~/export-esp.sh && cargo build --verbose
        working-directory: examples/esp-hardware
      - run: . ~/export-esp.sh && cargo build --verbose
        working-directory: examples/esp-embassy
